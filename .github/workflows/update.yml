name: Update pool

on:
  schedule:
    # Hourly. football-data.org's free tier posts some results late and out of
    # order, so a single daily fetch can miss the prior evening's matches until
    # the next day; polling every hour bounds that staleness and survives
    # GitHub's best-effort scheduler delaying or dropping any one run. Well
    # within all free tiers: the repo is public (unlimited Actions minutes),
    # the fetch is 1 API call/run (limit is 10/min), and 24 Pages deploys/day
    # is far under the ~10/hour soft cap.
    - cron: "20 * * * *"
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: "Skip the API fetch and rebuild from committed data (no key needed)"
        type: boolean
        default: false

concurrency:
  group: update-pool
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps.deploy_retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[card]"

      - name: Fetch results
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_fetch) }}
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -m wcpool.fetch --data-dir data

      - name: Score
        run: python -m wcpool.scoring data/matches.json data/pool.json data/standings.json

      - name: Build site
        run: python -m wcpool.site --data-dir data --out site

      - name: Render share card
        run: python -m wcpool.card --data-dir data --out site/card.png

      - name: Commit data snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "Data update $(date -u +%F) [skip ci]"
            git push
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

      # actions/deploy-pages intermittently returns "Deployment failed, try
      # again later" from the Pages API. Swallow one such failure and retry so
      # a transient hiccup doesn't turn the whole hourly run red.
      - name: Deploy to GitHub Pages
        id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Deploy to GitHub Pages (retry)
        if: steps.deploy.outcome == 'failure'
        id: deploy_retry
        uses: actions/deploy-pages@v5
