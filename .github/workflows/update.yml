name: Update pool

on:
  schedule:
    # Daily after the last 2026 match window (matches end by ~late evening ET)
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: "Skip the API fetch and rebuild from committed data (no key needed)"
        type: boolean
        default: false

concurrency:
  group: update-pool
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[card]"

      - name: Fetch results
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_fetch) }}
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -m wcpool.fetch --data-dir data

      - name: Score
        run: python -m wcpool.scoring data/matches.json data/pool.json data/standings.json

      - name: Build site
        run: python -m wcpool.site --data-dir data --out site

      - name: Render share card
        run: python -m wcpool.card --data-dir data --out site/card.png

      - name: Commit data snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "Data update $(date -u +%F) [skip ci]"
            git push
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
